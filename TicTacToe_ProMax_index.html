<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Tic Tac Toe Pro Max</title>
<link rel="stylesheet" href="TicTacToe_ProMax_style.css">
</head>
<body>
<div class="owner">👑 Developed & Maintained by Shyam Modanwal</div>

<div class="container">
<div class="logo">
<h1>🎮 TIC TAC TOE PRO MAX</h1>
<p>Created by Shyam Modanwal</p>
</div>

<div id="setup" class="card">
<h2>Start New Match</h2>
<input id="p1" placeholder="Player 1 Name">
<input id="p2" placeholder="Player 2 Name">
<button onclick="startGame()">Start Game</button>
</div>

<div id="game" class="hidden">
<div class="topbar">
<div id="scoreX">Player 1: 0</div>
<div id="draws">Draws: 0</div>
<div id="scoreO">Player 2: 0</div>
</div>

<h2 id="status"></h2>

<div class="board" id="board"></div>

<div class="controls">
<button onclick="resetRound()">Restart Round</button>
<button onclick="newMatch()">New Match</button>
<button onclick="toggleTheme()">🌙 Theme</button>
</div>

<h3>Match History</h3>
<ul id="history"></ul>
</div>
</div>

<script src="script.js"></script>
</body>
</html>
